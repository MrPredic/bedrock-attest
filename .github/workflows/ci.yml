name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check bedrock_attest/

      - name: Run tests
        run: pytest -q -m "not live"; code=$?; [ $code -eq 0 ] || [ $code -eq 5 ]

      - name: Coverage
        run: pytest --cov=bedrock_attest --cov-report=term-missing -q -m "not live"; code=$?; [ $code -eq 0 ] || [ $code -eq 5 ]
